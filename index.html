<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Keeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #c0b090;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #fps-counter {
      position: fixed;
      top: 8px;
      left: 8px;
      font-family: 'Inter', monospace;
      font-size: 12px;
      color: #80ff80;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 6px;
      border-radius: 3px;
      z-index: 1000;
      pointer-events: none;
    }
    #hud-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    #hud-overlay > * {
      pointer-events: auto;
    }
    /* ── HUD ───────────────────────────────────────────── */
    #hud-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 8px 28px;
      background: linear-gradient(180deg, #3a352e 0%, #2a2520 100%);
      border-bottom: 2px solid #5a4a35;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      font-family: 'MedievalSharp', cursive;
      font-size: 16px;
      color: #c0b090;
      z-index: 200;
      pointer-events: auto;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hud-label {
      font-size: 12px;
      color: #908070;
      font-family: 'Inter', sans-serif;
    }
    .gold-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: radial-gradient(circle at 40% 35%, #f0d060, #b89020);
      border-radius: 50%;
      border: 1px solid #806020;
    }
    .hud-gold-val { color: #f0c040; }
    .mana-bar-bg {
      width: 80px;
      height: 12px;
      background: #1a1825;
      border: 1px solid #4060a0;
      border-radius: 2px;
      overflow: hidden;
    }
    .mana-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3060c0, #4080f0);
      transition: width 0.3s ease;
      width: 0%;
    }
    .hud-mana-val { color: #4080f0; font-size: 12px; }
    .hud-imp-val { color: #c0b090; }
    .hud-wave-val { color: #c06040; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="fps-counter">FPS: --</div>
  <div id="hud-overlay"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
