<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Keeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* ── Tooltip ───────────────────────────────────────── */
    #tooltip {
      position: fixed;
      padding: 8px 12px;
      background: rgba(30, 25, 20, 0.95);
      border: 1px solid #6a5a45;
      border-radius: 4px;
      color: #c0b090;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      pointer-events: none;
      z-index: 300;
      max-width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.8);
      display: none;
    }
    .tt-title {
      font-family: 'MedievalSharp', cursive;
      font-size: 14px;
      color: #e0d0a0;
      margin-bottom: 4px;
      text-transform: capitalize;
    }
    .tt-row {
      font-size: 11px;
      color: #a09080;
    }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #c0b090;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #fps-counter {
      position: fixed;
      top: 8px;
      left: 8px;
      font-family: 'Inter', monospace;
      font-size: 12px;
      color: #80ff80;
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 6px;
      border-radius: 3px;
      z-index: 1000;
      pointer-events: none;
    }
    #hud-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    #hud-overlay > * {
      pointer-events: auto;
    }
    /* ── HUD ───────────────────────────────────────────── */
    #hud-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 8px 28px;
      background: linear-gradient(180deg, #3a352e 0%, #2a2520 100%);
      border-bottom: 2px solid #5a4a35;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      font-family: 'MedievalSharp', cursive;
      font-size: 16px;
      color: #c0b090;
      z-index: 200;
      pointer-events: auto;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hud-label {
      font-size: 12px;
      color: #908070;
      font-family: 'Inter', sans-serif;
    }
    .gold-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: radial-gradient(circle at 40% 35%, #f0d060, #b89020);
      border-radius: 50%;
      border: 1px solid #806020;
    }
    .hud-gold-val { color: #f0c040; }
    .mana-bar-bg {
      width: 80px;
      height: 12px;
      background: #1a1825;
      border: 1px solid #4060a0;
      border-radius: 2px;
      overflow: hidden;
    }
    .mana-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3060c0, #4080f0);
      transition: width 0.3s ease;
      width: 0%;
    }
    .hud-mana-val { color: #4080f0; font-size: 12px; }
    .hud-imp-val { color: #c0b090; }
    .hud-wave-val { color: #c06040; }
    /* ── Toolbar ───────────────────────────────────────── */
    #toolbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: stretch;
      gap: 4px;
      padding: 6px 12px;
      background: linear-gradient(0deg, #3a352e 0%, #2a2520 100%);
      border-top: 2px solid #5a4a35;
      border-radius: 8px 8px 0 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.6);
      z-index: 200;
      pointer-events: auto;
    }
    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      background: linear-gradient(180deg, #4a4238 0%, #3a3228 100%);
      border: 1px solid #6a5a45;
      border-radius: 4px;
      color: #c0b090;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      min-width: 56px;
      transition: background 0.15s;
      user-select: none;
    }
    .tool-btn:hover:not(.disabled) {
      background: linear-gradient(180deg, #5a5248 0%, #4a4238 100%);
    }
    .tool-btn.active {
      background: linear-gradient(180deg, #6a5a3a 0%, #5a4a2a 100%);
      border-color: #c0a060;
      color: #f0d080;
    }
    .tool-btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .tool-name { font-weight: 600; font-size: 11px; }
    .tool-cost { font-size: 9px; color: #908070; }
    .tool-hotkey {
      font-size: 9px;
      color: #706050;
      margin-top: 2px;
    }
    .toolbar-divider {
      width: 1px;
      background: #5a4a35;
      margin: 0 4px;
    }
    #speed-toggle {
      font-family: 'MedievalSharp', cursive;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="fps-counter">FPS: --</div>
  <div id="hud-overlay"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
